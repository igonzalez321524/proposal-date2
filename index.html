<!DOCTYPE html>

<html lang="en"><head>

  <meta charset="utf-8">

  <meta name="viewport" content="width=device-width,initial-scale=1">

  <title>Date Proposal 💐</title>



  <style>

    :root{

      /* ---- Sprite settings (edit these to match YOUR sprite sheet) ---- */

      --frameW: 72px;     /* width of one frame */

      --frameH: 72px;     /* height of one frame */

      --frames: 4;        /* number of frames across in the sheet */

      --animSpeed: 0.55s; /* faster = more frantic Kirby */



      /* ---- UI ---- */

      --arenaH: 360px;

    }



    * { box-sizing: border-box; }



    body{

      margin: 0;

      min-height: 100vh;

      display: grid;

      place-items: center;

      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;

      background: radial-gradient(circle at top, #ffe6f1, #fff 60%);

      color: #1b1b1b;

      padding: 18px;

    }



    .card{

      width: min(820px, 94vw);

      background: rgba(255,255,255,.92);

      border: 1px solid rgba(0,0,0,.06);

      border-radius: 24px;

      box-shadow: 0 18px 45px rgba(0,0,0,.12);

      padding: 26px 22px 20px;

      position: relative;

      overflow: hidden;

    }



    h1{

      margin: 0 0 8px;

      font-size: clamp(22px, 2.6vw, 34px);

      line-height: 1.15;

      letter-spacing: -0.02em;

    }



    .sub{

      margin: 0 0 18px;

      opacity: .8;

      font-size: 15px;

    }



    .arena{

      position: relative;

      height: var(--arenaH);

      border-radius: 18px;

      background: linear-gradient(180deg, #ffe3ef, #ffffff);

      border: 1px solid rgba(0,0,0,.06);

      overflow: hidden;

    }



    /* YES button */

    .actions{

      display: flex;

      gap: 12px;

      flex-wrap: wrap;

      margin-top: 16px;

      align-items: center;

    }



    #yesBtn{

      padding: 14px 20px;

      border: 0;

      border-radius: 999px;

      font-weight: 800;

      cursor: pointer;

      box-shadow: 0 10px 22px rgba(0,0,0,.12);

      background: #34c759;

      color: #0b2e14;

    }



    #yesBtn:active { transform: translateY(1px); }



    /* Kirby NO button (sprite) */

    #noBtn{

      position: absolute;

      margin-left: 80px;

      width: var(--frameW);

      height: var(--frameH);

      border: 0;

      padding: 0;

      background: transparent;

      cursor: pointer;

      user-select: none;

      -webkit-tap-highlight-color: transparent;



      /* sprite sheet */

      background-image: url("kirby-sprite.png");

      background-repeat: no-repeat;

      background-size: calc(var(--frameW) * var(--frames)) var(--frameH);



      /* animation */

      animation: kirbyWalk var(--animSpeed) steps(var(--frames)) infinite;

      filter: drop-shadow(0 10px 12px rgba(0,0,0,.18));

    }



    @keyframes kirbyWalk{

      from { background-position: 0 0; }

      to   { background-position: calc(var(--frameW) * var(--frames) * -1) 0; }

    }



    /* Optional: show the word "NO" as a tiny label under Kirby */

    #noLabel{

      position: absolute;

      font-weight: 900;

      font-size: 12px;

      letter-spacing: .08em;

      color: rgba(0,0,0,.55);

      transform: translate(-50%, 0);

      pointer-events: none;

      user-select: none;

    }



    .msg{

      margin-top: 14px;

      font-weight: 700;

      min-height: 1.2em;

    }



    .hint{

      margin-top: 6px;

      font-size: 12px;

      opacity: .65;

    }



    .pill{

      display: inline-flex;

      align-items: center;

      gap: 8px;

      padding: 10px 12px;

      border-radius: 999px;

      background: rgba(255, 222, 238, .6);

      border: 1px solid rgba(0,0,0,.06);

      font-size: 13px;

      opacity: .9;

    }

  </style>

</head>

      noBtn.style.top  = top  + "px";

      const cy = top + noBtn.offsetHeight + 4;

      noLabel.style.left = cx + "px";

      noLabel.style.top  = cy + "px";

    }
